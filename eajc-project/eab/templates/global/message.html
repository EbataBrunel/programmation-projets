<script type="text/javascript">
    $(document).ready(function(){

        // Appel initial pour défiler vers le bas à l'ouverture de la page
        scrollToBottom();

        // Fonction pour défiler vers le dernier message (le bas du conteneur)
        function scrollToBottom(){
            const container = document.getElementById('chat_container');
            setTimeout(() => {
                container.scrollTop = container.scrollHeight;
            }, 100);  // On ajoute un délai de 100ms
        }
        
        const roomName = "{{ room.id }}";
        const user_id = "{{ user_id }}";

        const chatSocket = new WebSocket(
            'ws://' + window.location.host + '/message/chat/' + roomName + '/'
        );
                                
        chatSocket.onmessage = function(e) {
            const data = JSON.parse(e.data);

            if (data.action === 'delete_message') {
                // Supprimer le message du DOM
                const messageElement = document.getElementById('message_' + data.message_id);              
                if (messageElement) {
                    messageElement.remove();
                }else{
                    // Si l'élément n'existe pas (par exemple si déjà supprimé), on peut afficher un message indicatif
                    console.log("Le message n'existe plus ou est déjà supprimé.");
                }

            } else {
                // Determiner la date actuelle
                const dateActuelle = new Date();

                const annee = dateActuelle.getFullYear();
                const mois = String(dateActuelle.getMonth() + 1).padStart(2, '0');  // Les mois commencent à 0, donc on ajoute 1
                const jour = String(dateActuelle.getDate()).padStart(2, '0');

                // Format final de la date : YYYY-MM-DD
                const date_actuelle = `${jour}-${mois}-${annee}`;

                if (data.user_id == user_id){
                    // Recuperer la date et l'heure à la quelle le message a été envoyée 
                    let [date_seule, heure_seule] = data.date.split(' ');
                    if (date_seule == date_actuelle){
                        document.querySelector('#chat-log').innerHTML += '<div id="message_'+data.message_id+'"><div class="row"><div class="col-md-10 bg-gray" style="margin-bottom:20px; padding:5px; border-bottom-right-radius:15px; border-top-left-radius: 15px; box-shadow: inset 0 0 1em gold, 0 0 2em black;"><span style=" color: blueviolet;"><b>'+data.last_name+' '+ data.first_name +'</b></span>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;<small class="pull-right"> <i align="right"></i>'+heure_seule+'</small><p>' + data.message + '</p></div>    <div class="col-md-1 col-xs-1 message"><a href="#" data-toggle="modal" data-target="#contactModal'+data.message_id+'" style="text-decoration: none"><button class="delete-button" style="border-radius:20px"><i class="fa fa-github-alt"></i> <i class="fa fa-chevron-down"></i></button> </a></div> </div>   <div class="modal fade delete" id="contactModal'+data.message_id+'" tabindex="-1" role="dialog" aria-labelledby="exampleModalLabel"aria-hidden="true"><div class="modal-dialog modal-sm" role="document"><div class="modal-content"><div class="modal-header danger"><h5 class="modal-title" id="exampleModalLabel"><span align="center"><i class="fa fa-trash"></i> Suppression</span></h5></div><div class="modal-body">Voulez-vous supprimer ce message ?</div><div class="modal-footer"><button class="btn btn-default btn-xs" type="button" data-dismiss="modal"><i class="fa fa-remove"></i> Annuler</button><button class="btn btn-danger btn-xs delete_chat" id="'+data.message_id+'"><i class="fa fa-trash"></i> Supprimer</button></div></div></div></div></div>';
                    }else{
                        document.querySelector('#chat-log').innerHTML += '<div id="message_'+data.message_id+'"><div class="row"><div class="col-md-10 bg-gray" style="margin-bottom:20px; padding:5px; border-bottom-right-radius:15px; border-top-left-radius: 15px; box-shadow: inset 0 0 1em gold, 0 0 2em black;"><span style=" color: blueviolet;"><b>'+data.last_name+' '+ data.first_name +'</b></span>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;<small class="pull-right"> <i align="right"></i>'+data.date+'</small><p>' + data.message + '</p></div>    <div class="col-md-1 col-xs-1 message"><a href="#" data-toggle="modal" data-target="#contactModal'+data.message_id+'" style="text-decoration: none"><button class="delete-button" style="border-radius:20px"><i class="fa fa-github-alt"></i> <i class="fa fa-chevron-down"></i></button> </a></div> </div>   <div class="modal fade delete" id="contactModal'+data.message_id+'" tabindex="-1" role="dialog" aria-labelledby="exampleModalLabel"aria-hidden="true"><div class="modal-dialog modal-sm" role="document"><div class="modal-content"><div class="modal-header danger"><h5 class="modal-title" id="exampleModalLabel"><span align="center"><i class="fa fa-trash"></i> Suppression</span></h5></div><div class="modal-body">Voulez-vous supprimer ce message ?</div><div class="modal-footer"><button class="btn btn-default btn-xs" type="button" data-dismiss="modal"><i class="fa fa-remove"></i> Annuler</button><button class="btn btn-danger btn-xs delete_chat" id="'+data.message_id+'"><i class="fa fa-trash"></i> Supprimer</button></div></div></div></div></div>';
                    }
                }else{
                    if (data.user_id){
                        // Recuperer la date et l'heure à la quelle le message a été envoyée 
                        let [date_seule, heure_seule] = data.date.split(' ');
                        if (date_seule == date_actuelle){
                            document.querySelector('#chat-log').innerHTML += '<div id="message_'+data.message_id+'"><a href="#" data-toggle="modal" data-target="#contactModal'+data.message_id+'" style="text-decoration: none"><div class="row"><div class="col-md-2 col-xs-2"></div><div class="col-md-10 col-xs-10 bg-gray" style="margin-bottom:20px; padding:5px; border-bottom-right-radius:15px; border-top-left-radius: 15px; box-shadow: inset 0 0 1em gold, 0 0 2em black"><span style=" color: blue;"><b>'+data.last_name+' '+ data.first_name +'</b></span>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;<small class="pull-right"> <i align="right"></i>'+heure_seule+'</small><p>' + data.message + '</p></div></div></a></div>';
                        }else{
                            document.querySelector('#chat-log').innerHTML += '<div id="message_'+data.message_id+'"><a href="#" data-toggle="modal" data-target="#contactModal'+data.message_id+'" style="text-decoration: none"><div class="row"><div class="col-md-2 col-xs-2"></div><div class="col-md-10 col-xs-10 bg-gray" style="margin-bottom:20px; padding:5px; border-bottom-right-radius:15px; border-top-left-radius: 15px; box-shadow: inset 0 0 1em gold, 0 0 2em black"><span style=" color: blue;"><b>'+data.last_name+' '+ data.first_name +'</b></span>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;<small class="pull-right"> <i align="right"></i>ok'+data.date+'</small><p>' + data.message + '</p></div></div></a></div>';
                        }
                    }
                }
                scrollToBottom();
            }

            if (data.action === 'user_list') {
                const users = data.users;
                const compteuserconnect = document.getElementById('connect');
                compteuserconnect.innerHTML = '';
                // Metre à jour le nombre des utilisateurs connectés
                document.querySelector('#connect').innerHTML +='<spam>'+data.length_users+'<spam>';
                // Mettre à jour la liste des utilisateurs connectés dans l'UI
                const userContainer = document.getElementById('user_list');
                userContainer.innerHTML = '';  // Vider la liste actuelle
        
                users.forEach(function(user) {
                    const userElement = document.createElement('li');
                    userElement.textContent = `${user[1]} ${user[2]}`;
                    userContainer.appendChild(userElement);
                });
            }
        };
                                
        chatSocket.onclose = function(e) {
            console.error('Chat socket closed unexpectedly');
        };
                                
        document.querySelector('#messageForm').onsubmit = function(e) {
            e.preventDefault();
            const messageInputDom = document.querySelector('#content');  // ID du champ généré par Django pour le contenu
            const message = messageInputDom.value;
            chatSocket.send(JSON.stringify({
                'message': message
            }));
            messageInputDom.value = '';  // Vider le champ après envoi
        };

        // Envoyer la demande de suppression de message via WebSocket
        $(document).on('click','.delete_chat',function(){
            $('.delete').modal('hide');
            var messageId = $(this).attr("id");
            chatSocket.send(JSON.stringify({
                'action': 'delete_message',
                'message_id': messageId
            }));
        });

    });
</script>
