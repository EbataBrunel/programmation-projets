{% extends 'global/base.html' %}
{% block title %} {{parametre.appname}} | Edition d'une thèse {% endblock %}
{% block content %}
<!-- Content Wrapper. Contains page content -->
<div class="content-wrapper">
    <!-- Content Header (Page header) -->
    <section class="content-header">
        <h1>
            <i class="fa fa-crop"></i> Portfolio
        </h1>
        <ol class="breadcrumb">
          <li><a href="{% url 'dashboard' %}"><i class="fa fa-dashboard"></i> Tableau de bord</a></li>
          <li><a href="{% url 'portfolio' %}"> Portfolio</a></li>
          <li ><a href="{% url 'projet/projects' %}">Thèses</a></li>
          <li class="active">Edition</li>
        </ol>
    </section>
    <!-- Main content -->
    <section class="content">
        <div class="row">
            <div class="col-md-6 col-md-offset-3">
                    <div class="box box-primary">
                        <div class="box-header with-border">
                            <h6 class="box-title"><i class="fa fa-plus"></i> Edition d'une thèse</h6>
                        </div>
                        <div class="box-body">
                            <!-- On inclut l'image de chargement -->
                            {% include 'global/_loading.html' %}
                            <form method="post" action="" id="formUpdateThese">
                                <div class="row">
                                    <div class="col-md-12">
                                        <input name="id" value="{{ these.id }}" required hidden="True">
                                        <div class="form-group">
                                            <label for="titre">Titre *</label>
                                           <input type="text" name="titre" id="titre" value="{{ these.titre }}" class="form-control" required> 
                                        </div>
                                        <div class="form-group">
                                            <label for="resume">Résumé *</label>
                                           <textarea type="text" name="resume" id="resume" rows="3" class="form-control" required>{{ these.resume }}</textarea> 
                                        </div>
                                        <div class="form-group">
                                            <label for="universite">Univesité *</label>
                                           <input type="text" name="universite" id="universite" value="{{ these.universite }}" class="form-control" required> 
                                        </div>
                                        <div class="form-group">
                                            <label for="date_soutenance">Date de la soutenance *</label>
                                           <input type="date" name="date_soutenance" id="date_soutenance" value="{{ these.date_soutenance|date:"Y-m-d" }}" class="form-control" required> 
                                        </div>
                                    </div>
                                </div>
                                <div class="row">
                                    <div class="col-md-12">
                                        <a href="{% url 'these/theses' %}" class="btn btn-default btn-xs"><i class="fa fa-arrow-circle-left"></i> Retour</a>&nbsp;
                                        <button class="btn btn-primary btn-xs"><i class="fa fa-check"></i> Valider</button>
                                    </div>
                                </div>
                            </form>
                            <div data-backdrop="True" class="modal fade" id="message" tabindex="-1" role="dialog" aria-labelledby="myModalLabel" aria-hidden="true">
                                <div class="modal-dialog modal-sm" role="document">
                                    <div class="modal-content" style="background-color: rgb(28,36,47)">
                                      <div class="modal-header text-center"><span style="color:white"><i class="fa fa-info"></i> Information</span>
                                        <button type="button" class="close" data-dismiss="modal" aria-label="Close"><span aria-hidden="true" class="badge badge-warning" style="color:white">X</span></button>
                                      </div>
                                      <div class="modal-body" id="content-message"></div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
            </div>            
        </div>                
    </section>
</div>
<!-- /.container-fluid -->
{% endblock %}
