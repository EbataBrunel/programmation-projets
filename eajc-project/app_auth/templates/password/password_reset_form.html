<!DOCTYPE html>
{% load static %}
<html>
  <head>
    <meta charset="utf-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <title>EAJC | Nouveau mot de passe</title>
    <!-- Tell the browser to be responsive to screen width -->
    <meta content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" name="viewport">
    <!-- Bootstrap 3.3.5 -->
    <link rel="stylesheet" href="{% static 'bootstrap/css/bootstrap.min.css' %}">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/font-awesome/4.4.0/css/font-awesome.min.css">
    <!-- Ionicons -->
    <link rel="stylesheet" href="https://code.ionicframework.com/ionicons/2.0.1/css/ionicons.min.css">
    <!-- Theme style -->
    <link rel="stylesheet" href="{% static 'dist/css/AdminLTE.min.css' %}">
    <!-- iCheck -->
    <link rel="stylesheet" href="{% static 'plugins/iCheck/square/blue.css' %}">

    <style>

      #id_new_password1 {
        border-radius: 7px;
        width: 100%;
        height: 40px;
        border: 1px solid #e0e0e0 
      }
  
      #id_new_password2 {
        border-radius: 7px;
        width: 100%;
        height: 40px;
        border: 1px solid #e0e0e0 
      }
  
      input:focus {
        border-color: #87CEEB; /* Bleu ciel */
        box-shadow: 0 0 5px rgba(0, 206, 235, 0.5); /* Optionnel : légère ombre bleue */
        outline: none; /* Enlève le contour par défaut */
      }
    </style>

    <!-- HTML5 Shim and Respond.js IE8 support of HTML5 elements and media queries -->
    <!-- WARNING: Respond.js doesn't work if you view the page via file:// -->
    <!--[if lt IE 9]>
        <script src="https://oss.maxcdn.com/html5shiv/3.7.3/html5shiv.min.js"></script>
        <script src="https://oss.maxcdn.com/respond/1.4.2/respond.min.js"></script>
    <![endif]-->
  </head>
  <body class="hold-transition register-page">
    <div class="register-box">
      <div class="register-logo">
        <img class="img-circle text-center" width="100" height="100" src="{% static 'dist/img/dessin.jpg' %}" alt="..." />
      </div>

      <div class="register-box-body">
        <h4>
            Entrez votre nouveau mot de passe
        </h4>
        <form action="" method="post">
          <div class="form-group has-feedback">
            {% csrf_token %}
            {% for error in form.non_field_errors %}
                <div class="alert alert-danger">
                    <strong>{{ error|escape }}</strong>
                </div>
            {% endfor %}
            {% for field in form %}
                <div class="group-form">
                    {{ field.label }}<br>
                    {{ field }}
                </div>
                <br>
            {% if field.errors %}
                <div class="alert alert-danger">
                    <strong>{{ field.errors|escape }}</strong>
                </div>
            {% endif %}
            {% endfor %}
          </div>
          <div class="row">
            <div class="col-xs-8">
              <button type="submit" class="btn btn-primary btn-block btn-flat"><i class="fa fa-check"></i> Valider</button>
            </div><!-- /.col -->
          </div>
        </form>
      </div><!-- /.form-box -->
    </div><!-- /.register-box -->

    <!-- jQuery 2.1.4 -->
    <script src="{% static 'plugins/jQuery/jQuery-2.1.4.min.js' %}"></script>
    <!-- Bootstrap 3.3.5 -->
    <script src="{% static 'bootstrap/js/bootstrap.min.js' %}"></script>
    <!-- iCheck -->
    <script src="{% static 'plugins/iCheck/icheck.min.js' %}"></script>
    <script>
      $(function () {
        $('input').iCheck({
          checkboxClass: 'icheckbox_square-blue',
          radioClass: 'iradio_square-blue',
          increaseArea: '20%' // optional
        });
      });
    </script>
  </body>
</html>
