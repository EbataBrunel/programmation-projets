{% extends 'global/base.html' %}
{% block title %} {{ setting.appname }} | Edition du profil {% endblock %}
{% block content %}
{% load static %}

<!-- Begin Page Content -->
<div class="container-fluid">

    <!-- Page Heading -->
    <h1 class="h3 mb-2 text-gray-800">Tableau de bord</h1>

    <!-- DataTales Example -->
    <div class="card shadow mb-4">
        <div class="card-header py-3">
            <h6 class="m-0 font-weight-bold text-primary">Edition du profil </h6>
        </div>
        <div class="card-body">
            <form method="post" action="">
                {% csrf_token %}
                <div class="row">
                    <div class="col-md-6">
                        <div class="form-group">
                            <label for="last_name">Nom *</label>
                           <input type="text" name="last_name" id="last_name" value="{{ request.user.last_name }}" class="form-control" required> 
                        </div>
                        <div class="form-group">
                            <label for="first_name">Prénom </label>
                           <input type="text" name="first_name" id="first_name" value="{{ request.user.first_name }}" class="form-control"> 
                        </div>
                        <div class="form-group">
                            <label for="email">Email *</label>
                           <input type="text" name="email" id="email" value="{{ request.user.email }}" class="form-control" required> 
                        </div>
                        <div class="form-group">
                            <label for="gender">Sexe *</label>
                            <select name="gender" id="gender" class="form-control" required>
                                {% if profile %}
                                    {% if profile.gender == "Masculin" %}
                                    <option value="Masculin">Masculin</option>
                                    <option value="Feminin">Feminin</option>
                                    {% else %}
                                    <option value="Feminin">Feminin</option>
                                    <option value="Masculin">Masculin</option>
                                    {% endif %}
                                {% else %}
                                    <option value="">-- Selectionnez --</option>
                                    <option value="Masculin">Masculin</option>
                                    <option value="Masculin">Feminin</option>
                                {% endif %}
                            </select>
                        </div>
                    </div>
                    <div class="col-md-6">
                        <div class="form-group">
                            <label for="country">Pays de résidence *</label>
                            <select name="country" class="form-control" required>
                                {% if profile.country %}
                                <option value="{{ profile.country }}">{{ profile.country }}</option>
                                {% else %}
                                <option value="">-- Selectionnez --</option>
                                {% endif %} 

                                {% for country in countries %}
                                <option value="{{ country }}">{{ country }}</option>
                                {% endfor %}
                            </select>
                        </div>

                        {% if profile %}
                        <div class="form-group">
                            <label for="address">Adresse *</label>
                           <input type="text" name="address" id="address" value="{{ profile.address }}" class="form-control" required> 
                        </div>
                        <div class="form-group">
                            <label for="phone">Téléphone *</label>
                           <input type="text" name="phone" id="phone" value="{{ profile.phone }}" class="form-control" required> 
                        </div>
                        <div class="form-group">
                            <label for="profession">Profession *</label>
                           <input type="text" name="profession" id="profession" value="{{ profile.profession }}" class="form-control" required> 
                        </div>
                        {% else %}
                        <div class="form-group">
                            <label for="address">Adresse *</label>
                           <input type="text" name="address" id="address" id="address" class="form-control" required> 
                        </div>
                        <div class="form-group">
                            <label for="phone">Téléphone *</label>
                           <input type="text" name="phone" id="phone" class="form-control" required> 
                        </div>
                        <div class="form-group">
                            <label for="profession">Profession *</label>
                           <input type="text" name="profession" id="profession" class="form-control" required> 
                        </div>
                        {% endif %}
                    </div>
                </div>
                <div class="row">
                    <div class="col-md-12">
                        <a href="{% url 'user/profile' %}" class="btn btn-secondary btn-sm"><i class="fa fa-arrow-circle-left"></i> Retour</a>&nbsp;
                        <button class="btn btn-primary btn-sm"><i class="fa fa-check"></i> Valider</button>
                    </div>
                </div>
            </form>        
        </div>
    </div>
</div>
<!-- /.container-fluid -->
{% endblock %}
