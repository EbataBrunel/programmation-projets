{% load crypto_filters %}
<div class="card"> 
    <div class="card-body">
        <h5 class="card-title">{{ trimestre }}</h5>
        {% for evenement in evenements %}
        <div class="card">
            <div class="card-body">
                <h5 class="card-title">{{ evenement.name }}</h5>
                <div class="table-responsive">
                    <table class="table">
                        <tr>
                            <th>Description</th>
                            <td> : {{ evenement.description }}</td>
                        </tr>
                        <tr>
                            <th>Date </th> 
                            <td class="white-space"> : du {{ evenement.start_date|date:"d/m/Y" }} au {{ evenement.end_date|date:"d/m/Y" }}</td>
                        <tr>
                    </table>
                </div>
            </div>
        </div>
        {% endfor %}
    </div>
</div>
