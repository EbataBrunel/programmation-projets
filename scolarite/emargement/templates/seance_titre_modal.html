<div class="card">
    <div class="card-body">
        <h5 class="card-title">Mise à jour de l'émargement du <b>{{ emargement.date_emargement|date:"d/m/Y" }}</b></h5>
        <!-- Vertical Form -->
        <form method="post" action="" id="formSeanceTitreEmargement-{{ emargement.id }}" class="row g-3">
            {% csrf_token %}
            <input type="text" name="id" value="{{ emargement.id }}" hidden="True" required="True">
            <div class="col-12">
                <label for="seance" class="form-label">Séance : *</label>
                <select name="seance" id="seance" class="form-select" aria-label="Default select example" required>
                    <option value="{{ emargement.seance }}">{{ emargement.seance }}</option>
                    {% for seance in seances %}
                        <option value="{{ seance }}">{{ seance }}</option>
                    {% endfor %}
                </select>
            </div>
            <div class="col-md-12">
                <textarea class="form-control" name="titre" id="titre" rows="3" placeholder="Message" required>{{ emargement.titre }}</textarea>
            </div>
            <div class="text-center">
                <button type="submit" class="btn btn-primary btn-sm"><i class="bi bi-check-circle"></i> Valider </button>
            </div>
        </form><!-- Vertical Form -->
    </div>
</div>
